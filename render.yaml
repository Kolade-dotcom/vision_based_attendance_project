services:
  - type: web
    name: vision-attendance
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: WORKER_API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
