<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — Lumina</title>
    <meta name="description" content="Sign in to Lumina — Student attendance portal. Track your attendance records." />
    <meta name="theme-color" content="#6366f1" />
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}" />

    <script>
      (function() {
        var saved = localStorage.getItem('lumina-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}" />

    <style>
      /* === Login page layout === */

      .login-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
        padding: var(--space-4);
        background-color: var(--surface);
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        background-color: var(--surface-raised);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        padding: var(--space-7) var(--space-6);
      }

      @media (max-width: 480px) {
        .login-card {
          border: none;
          border-radius: 0;
          box-shadow: none;
          max-width: none;
          padding: var(--space-6) var(--space-4);
        }

        .login-page {
          align-items: flex-start;
          padding: var(--space-7) 0 0;
        }
      }

      /* --- Logo --- */

      .login-logo {
        text-align: center;
        margin-bottom: var(--space-1);
      }

      .login-logo-mark {
        font-family: var(--font-display);
        font-size: var(--text-3xl);
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.02em;
        line-height: 1;
      }

      .login-logo-mark span {
        color: var(--brand);
      }

      .login-subtitle {
        text-align: center;
        font-size: var(--text-sm);
        color: var(--text-muted);
        margin-bottom: var(--space-6);
      }

      /* --- Tab toggle --- */

      .login-tabs {
        display: flex;
        background-color: var(--surface-sunken);
        border-radius: var(--radius-full);
        padding: 3px;
        margin-bottom: var(--space-6);
      }

      .login-tab {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: var(--space-2) var(--space-4);
        font-family: var(--font-body);
        font-size: var(--text-sm);
        font-weight: 600;
        color: var(--text-secondary);
        background: none;
        border: none;
        border-radius: var(--radius-full);
        cursor: pointer;
        transition: var(--transition-colors);
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      @media (max-width: 640px) {
        .login-tab {
          min-height: 44px;
        }
      }

      .login-tab:hover {
        color: var(--text-primary);
      }

      .login-tab:focus-visible {
        outline: 2px solid var(--border-focus);
        outline-offset: -2px;
      }

      .login-tab[aria-selected="true"] {
        background-color: var(--surface-raised);
        color: var(--text-primary);
        box-shadow: var(--shadow-xs);
      }

      /* --- Forms --- */

      .login-form {
        display: none;
      }

      .login-form.active {
        display: block;
      }

      .form-group {
        margin-bottom: var(--space-4);
      }

      .form-group:last-of-type {
        margin-bottom: var(--space-5);
      }

      .form-hint {
        font-size: var(--text-xs);
        color: var(--text-muted);
        margin-top: var(--space-1);
      }

      /* --- Error message --- */

      .form-error {
        display: none;
        padding: var(--space-3);
        margin-bottom: var(--space-4);
        font-size: var(--text-sm);
        color: var(--danger);
        background-color: var(--danger-light);
        border: 1px solid var(--danger);
        border-radius: var(--radius-sm);
      }

      .form-error.visible {
        display: block;
      }

      /* --- Full-width button --- */

      .btn-block {
        width: 100%;
      }

      /* --- Footer link --- */

      .login-footer {
        text-align: center;
        margin-top: var(--space-6);
        padding-top: var(--space-5);
        border-top: 1px solid var(--border);
      }

      .login-footer-text {
        font-size: var(--text-sm);
        color: var(--text-muted);
      }

      .login-footer-text a {
        font-weight: 600;
      }

      /* --- Loading spinner on button --- */

      .btn .spinner {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid currentColor;
        border-right-color: transparent;
        border-radius: var(--radius-full);
        animation: spin 600ms linear infinite;
      }

      .btn.loading .spinner {
        display: inline-block;
      }

      .btn.loading .btn-label {
        visibility: hidden;
        width: 0;
        overflow: hidden;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <main class="login-page">
      <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
          <div class="login-logo-mark"><span>&#9678;</span> Lumina</div>
        </div>
        <p class="login-subtitle">Student Portal</p>

        <!-- Tab toggle -->
        <div class="login-tabs" role="tablist" aria-label="Authentication mode">
          <button
            type="button"
            class="login-tab"
            role="tab"
            id="tab-signin"
            aria-selected="true"
            aria-controls="panel-signin"
          >Sign in</button>
          <button
            type="button"
            class="login-tab"
            role="tab"
            id="tab-signup"
            aria-selected="false"
            aria-controls="panel-signup"
          >Sign up</button>
        </div>

        <!-- Sign in form -->
        <form
          id="panel-signin"
          class="login-form active"
          role="tabpanel"
          aria-labelledby="tab-signin"
          novalidate
        >
          <div id="signin-error" class="form-error" role="alert"></div>

          <div class="form-group">
            <label for="signin-matric" class="label">Matric number</label>
            <input
              type="text"
              id="signin-matric"
              name="matric_number"
              class="input"
              placeholder="e.g. 20/52HA001"
              autocomplete="username"
              required
            />
          </div>

          <div class="form-group">
            <label for="signin-password" class="label">Password</label>
            <input
              type="password"
              id="signin-password"
              name="password"
              class="input"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg">
            <span class="spinner"></span>
            <span class="btn-label">Sign in</span>
          </button>
        </form>

        <!-- Sign up form -->
        <form
          id="panel-signup"
          class="login-form"
          role="tabpanel"
          aria-labelledby="tab-signup"
          novalidate
        >
          <div id="signup-error" class="form-error" role="alert"></div>

          <div class="form-group">
            <label for="signup-matric" class="label">Matric number</label>
            <input
              type="text"
              id="signup-matric"
              name="matric_number"
              class="input"
              placeholder="e.g. 20/52HA001"
              autocomplete="username"
              required
            />
          </div>

          <div class="form-group">
            <label for="signup-name" class="label">Full name</label>
            <input
              type="text"
              id="signup-name"
              name="name"
              class="input"
              placeholder="Your full name"
              autocomplete="name"
              required
            />
          </div>

          <div class="form-group">
            <label for="signup-email" class="label">
              Email
              <span class="form-hint">(optional)</span>
            </label>
            <input
              type="email"
              id="signup-email"
              name="email"
              class="input"
              placeholder="you@university.edu"
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="signup-password" class="label">Password</label>
            <input
              type="password"
              id="signup-password"
              name="password"
              class="input"
              placeholder="Create a password"
              autocomplete="new-password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg">
            <span class="spinner"></span>
            <span class="btn-label">Create account</span>
          </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
          <p class="login-footer-text">
            Are you a lecturer? <a href="/dashboard/login">Go to Dashboard</a>
          </p>
        </div>
      </div>
    </main>

    <script src="{{ url_for('static', filename='js/portal/login.js') }}"></script>
  </body>
</html>
