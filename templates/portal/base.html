<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Lumina{% endblock %}</title>
    <meta name="description" content="Lumina — Student attendance portal. View your attendance records and course information." />
    <meta name="theme-color" content="#0d9488" />
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}" />
    <meta property="og:title" content="Lumina Student Portal" />
    <meta property="og:description" content="Student attendance portal — view your records and course information." />
    <meta property="og:type" content="website" />

    <!-- FOUC prevention: apply saved theme before paint -->
    <script>
      (function() {
        var saved = localStorage.getItem('lumina-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}" />

    <style>
      /* === Portal Layout (scoped) ============================================ */

      .portal-topbar {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 48px;
        padding: 0 var(--space-4);
        background-color: var(--surface-raised);
        border-bottom: 1px solid var(--border);
      }

      .portal-logo {
        font-family: var(--font-display);
        font-size: var(--text-lg);
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.02em;
        text-decoration: none;
        line-height: 1;
      }

      .portal-logo:hover {
        text-decoration: none;
      }

      .portal-theme-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        padding: 0;
        border: 1px solid var(--border);
        border-radius: var(--radius-full);
        background-color: var(--surface-raised);
        color: var(--text-secondary);
        cursor: pointer;
        transition: var(--transition-colors);
      }

      .portal-theme-toggle:hover {
        background-color: var(--surface-sunken);
        color: var(--text-primary);
      }

      .portal-theme-toggle:focus-visible {
        outline: 2px solid var(--border-focus);
        outline-offset: 2px;
      }

      /* Sun/moon icon toggling */
      [data-theme="dark"] .portal-theme-toggle .icon-moon { display: none; }
      [data-theme="light"] .portal-theme-toggle .icon-sun { display: none; }

      /* --- Desktop top nav ---------------------------------------------------- */

      .portal-desktop-nav {
        display: none;
        align-items: center;
        justify-content: center;
        gap: var(--space-6);
        height: 44px;
        background-color: var(--surface-raised);
        border-bottom: 1px solid var(--border);
      }

      .portal-desktop-nav a {
        display: inline-flex;
        align-items: center;
        gap: var(--space-2);
        padding: var(--space-2) var(--space-3);
        font-family: var(--font-body);
        font-size: var(--text-sm);
        font-weight: 500;
        color: var(--text-muted);
        text-decoration: none;
        border-bottom: 2px solid transparent;
        transition: color 150ms ease, border-color 150ms ease;
      }

      .portal-desktop-nav a:hover {
        color: var(--text-primary);
        text-decoration: none;
      }

      .portal-desktop-nav a[aria-current="page"] {
        color: var(--brand);
        border-bottom-color: var(--brand);
      }

      .portal-desktop-nav a svg {
        display: inline-block;
        flex-shrink: 0;
      }

      @media (min-width: 768px) {
        .portal-desktop-nav {
          display: flex;
        }
      }

      /* --- Content area -------------------------------------------------------- */

      .portal-content {
        flex: 1;
        overflow-y: auto;
        padding: var(--space-4);
        /* room for bottom nav on mobile */
        padding-bottom: calc(56px + var(--space-4) + env(safe-area-inset-bottom, 0px));
      }

      @media (min-width: 768px) {
        .portal-content {
          max-width: 860px;
          margin-left: auto;
          margin-right: auto;
          padding: var(--space-6);
          padding-bottom: var(--space-4);
        }
      }

      @media (min-width: 1200px) {
        .portal-content {
          max-width: 1040px;
          padding: var(--space-8) var(--space-6);
        }
      }

      /* --- Bottom nav (mobile) ------------------------------------------------ */

      .portal-bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: stretch;
        justify-content: space-around;
        height: calc(56px + env(safe-area-inset-bottom, 0px));
        padding-bottom: env(safe-area-inset-bottom, 0px);
        background-color: var(--surface-raised);
        border-top: 1px solid var(--border);
        box-shadow: var(--shadow-md);
      }

      .portal-bottom-nav a {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        flex: 1;
        min-width: 48px;
        min-height: 48px;
        padding: var(--space-1) 0;
        font-family: var(--font-body);
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        text-decoration: none;
        transition: color 150ms ease;
        -webkit-tap-highlight-color: transparent;
      }

      .portal-bottom-nav a:hover {
        color: var(--text-secondary);
        text-decoration: none;
      }

      .portal-bottom-nav a[aria-current="page"] {
        color: var(--brand);
      }

      .portal-bottom-nav a svg {
        display: block;
        flex-shrink: 0;
      }

      @media (min-width: 768px) {
        .portal-bottom-nav {
          display: none;
        }

        .portal-content {
          padding-bottom: var(--space-6);
        }
      }

      /* --- Portal body layout ------------------------------------------------- */

      .portal-shell {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        min-height: 100dvh;
      }
    </style>
  </head>

  <body>
    <div class="portal-shell">
      <!-- Top bar -->
      <header class="portal-topbar">
        <a href="/portal/" class="portal-logo">Lumina</a>

        <button
          type="button"
          class="portal-theme-toggle"
          onclick="toggleTheme()"
          aria-label="Toggle theme"
          title="Toggle theme"
        >
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </header>

      <!-- Desktop navigation (hidden on mobile) -->
      <nav class="portal-desktop-nav" aria-label="Portal navigation">
        <a href="/portal/"{% if request.path == '/portal/' or request.path == '/portal' %} aria-current="page"{% endif %}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </a>
        <a href="/portal/attendance"{% if request.path.startswith('/portal/attendance') %} aria-current="page"{% endif %}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/></svg>
          Attendance
        </a>
        <a href="/portal/profile"{% if request.path.startswith('/portal/profile') %} aria-current="page"{% endif %}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
      </nav>

      <!-- Main content -->
      <main class="portal-content">
        {% block content %}{% endblock %}
      </main>

      <!-- Bottom navigation (mobile only) -->
      <nav class="portal-bottom-nav" aria-label="Portal navigation">
        <a href="/portal/"{% if request.path == '/portal/' or request.path == '/portal' %} aria-current="page"{% endif %}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </a>
        <a href="/portal/attendance"{% if request.path.startswith('/portal/attendance') %} aria-current="page"{% endif %}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/></svg>
          Attendance
        </a>
        <a href="/portal/profile"{% if request.path.startswith('/portal/profile') %} aria-current="page"{% endif %}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
      </nav>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/custom-select.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
